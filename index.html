<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подтверждение номера</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 24px 16px;
      background: #f5f6f8;
      color: #222;
    }
    .card {
      max-width: 360px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    h1 {
      font-size: 20px;
      margin: 0 0 12px;
    }
    p {
      margin: 0 0 16px;
      line-height: 1.4;
      color: #555;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
      background: #4bb34b;
      color: #fff;
    }
    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.35;
      color: #666;
      min-height: 20px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 60vh;
      overflow-y: auto;
    }
    .error {
      color: #c62828;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Подтверждение номера</h1>
    <p>Нажмите кнопку ниже, чтобы подтвердить номер телефона VK и узнать баланс.</p>
    <button id="verify-btn" type="button">Подтвердить номер</button>
    <div id="status" class="status"></div>
  </div>
  <script src="https://unpkg.com/@vkontakte/vk-bridge@2.15.9/dist/browser.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
